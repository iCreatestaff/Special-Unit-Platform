<mat-card-header class="card-header d-flex justify-content-between align-items-center">
  <mat-card-title>
    Add Equipment
  </mat-card-title>
  <button mat-icon-button class="close-btn" (click)="close()" aria-label="Close">
    <mat-icon>close</mat-icon>
  </button>
</mat-card-header>

<mat-dialog-content class="container-fluid equipment-modal modal">
  <div class="modal-content">
    <form [formGroup]="equipmentForm" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-6">
          <mat-form-field appearance="outline" class="w-100 assigned-equipment-select">
            <mat-label>Assigned Equipments</mat-label>
            <mat-select formControlName="name" required panelClass="equipment-select-panel">
              <mat-option *ngFor="let equipment of equipmentStocks" [value]="equipment.equipmentName">
                <div class="equipment-option">
                  <img [src]="equipment.photo" alt="equipment photo" class="equipment-thumbnail" />
                  <div class="equipment-info">
                    <span class="equipment-name">{{ equipment.equipmentName }}</span>
                    
                  </div>
                </div>
              </mat-option>
            </mat-select>
            <mat-error *ngIf="equipmentForm.get('name')?.hasError('required')">Equipment is required.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Equipment Type</mat-label>
            <input matInput formControlName="type" required />
            <mat-error *ngIf="equipmentForm.get('type')?.hasError('required')">Type is required.</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Quantity</mat-label>
            <input matInput type="number" formControlName="quantity" min="1" />
            <mat-error *ngIf="equipmentForm.get('quantity')?.hasError('required')">Quantity is required.</mat-error>
            <mat-error *ngIf="equipmentForm.get('quantity')?.hasError('min')">Quantity should be at least 1.</mat-error>
          </mat-form-field>
        </div>

        <div class="col-6">
          <mat-label class="f-w-600 m-b-8 d-block">Upload Image</mat-label>
          <div class="image-upload-container">
            <div class="file-upload" (click)="fileUpload.click()">
              <input type="file" id="file-upload-input" class="file-input" (change)="onFileSelected($event)" #fileUpload />
              <span class="file-name">{{ fileName || 'No file uploaded yet.' }}</span>
              <button mat-mini-fab color="primary" class="upload-btn">
                <mat-icon>attach_file</mat-icon>
              </button>
            </div>

            <div *ngIf="imageUrl || equipmentForm.get('photo')?.value" style="margin-top:30px" class="mt-2">
              <img *ngIf="imageUrl" [src]="imageUrl" class="img-preview" />
              <img *ngIf="equipmentForm.get('photo')?.value && !imageUrl" [src]="equipmentForm.get('photo')?.value" class="img-preview" />
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" color="warn" class="close-btn" (click)="close()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="equipmentForm.invalid" type="submit" (click)="onSubmit()">
    Save
  </button>
</mat-dialog-actions>
