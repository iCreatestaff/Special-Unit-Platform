<mat-card class="cardWithShadow container-fluid">
  <mat-card-header class="card-header d-flex justify-content-between align-items-center">
    <mat-card-title>Set Non-Availability</mat-card-title>
    <button mat-icon-button class="close-btn" (click)="onCancel()" aria-label="Close">
      <mat-icon>close</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content class="container-fluid equipment-modal">
    <form [formGroup]="nonAvailabilityForm" (ngSubmit)="onSave()">
      <div class="row">
        <!-- Left Column: Date Range -->
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100 date-field">
            <mat-label>Enter a date range</mat-label>
            <mat-date-range-input [rangePicker]="picker" formGroupName="dateRange">
              <input matStartDate formControlName="start" placeholder="Start Date" required readonly>
              <input matEndDate formControlName="end" placeholder="End Date" required readonly>
            </mat-date-range-input>
            <mat-hint>MM/DD/YYYY – MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-date-range-picker #picker></mat-date-range-picker>
            <mat-error *ngIf="nonAvailabilityForm.get('dateRange.start')?.hasError('required')">Start Date is required</mat-error>
            <mat-error *ngIf="nonAvailabilityForm.get('dateRange.end')?.hasError('required')">End Date is required</mat-error>
          </mat-form-field>
        </div>

        <!-- Right Column: Time Pickers (same row) -->
        <div class="row">
          <div class="time-fields d-flex justify-content-between">
            <mat-form-field appearance="outline" class="col-6 time-field w-48">
              <mat-label>Start Time</mat-label>
              <mat-select formControlName="startTimeOnly" required>
                <mat-option *ngFor="let time of timeOptions" [value]="time">
                  {{ time }}
                </mat-option>
              </mat-select>
              <mat-icon matPrefix>schedule</mat-icon>
              <mat-error *ngIf="nonAvailabilityForm.get('startTimeOnly')?.hasError('required')">Start Time is required</mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline" class="col-6 time-field w-48">
              <mat-label>End Time</mat-label>
              <mat-select formControlName="endTimeOnly" required>
                <mat-option *ngFor="let time of timeOptions" [value]="time">
                  {{ time }}
                </mat-option>
              </mat-select>
              <mat-icon matPrefix>schedule</mat-icon>
              <mat-error *ngIf="nonAvailabilityForm.get('endTimeOnly')?.hasError('required')">End Time is required</mat-error>
            </mat-form-field>
          </div>
        </div>
      </div>

      <div class="actions d-flex justify-content-end mt-4">
        <button mat-raised-button color="primary" type="submit" class="mr-2" [disabled]="!nonAvailabilityForm.valid">Save</button>
        <button mat-stroked-button color="warn" type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
