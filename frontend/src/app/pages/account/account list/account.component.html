<div class="container-fluid mt-4">
  <div class="account-management-container">
  <!-- Header Section -->
  <div class="management-header">
    <h1 class="page-title">Account Management</h1>
    
    <div class="header-actions">
      <!-- Filter Toggle -->
      <button mat-stroked-button (click)="toggleFilterSection()" style="border: 1px solid rgb(124, 137, 253);" class="filter-toggle" aria-label="Toggle filters">
        <mat-icon>filter_alt</mat-icon>
        <span>{{ showFilterSection ? 'Hide Filters' : 'Show Filters' }}</span>
      </button>
      
      <!-- Add Account Button -->
      <button mat-raised-button color="primary" (click)="openCreateAccountModal()" class="add-account-btn">
        <mat-icon>person_add</mat-icon>
        <span>Add Account</span>
      </button>
    </div>
  </div>

  <!-- Filter Section -->
  <div *ngIf="showFilterSection" @fadeIn class="filter-section">
    <div class="filter-grid">
      <!-- Role Filter -->
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Role</mat-label>
        <mat-select [formControl]="roleFilter" multiple>
          <mat-option *ngFor="let role of availableRoles" [value]="role">{{role}}</mat-option>
        </mat-select>
        <mat-icon matSuffix>manage_accounts</mat-icon>
      </mat-form-field>

      <!-- Type Filter -->
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Type</mat-label>
        <mat-select [formControl]="typeFilter" multiple>
          <mat-option *ngFor="let type of availableTypes" [value]="type">{{type}}</mat-option>
        </mat-select>
        <mat-icon matSuffix>category</mat-icon>
      </mat-form-field>

      <!-- Username Search -->
      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Search Username</mat-label>
        <input matInput [formControl]="usernameFilter" placeholder="Filter by username">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <div class="filter-actions">
      <button mat-button (click)="clearFilters()" class="clear-filters">
        <mat-icon>clear_all</mat-icon>
        <span>Reset Filters</span>
      </button>
      <button mat-raised-button color="primary" (click)="applyFilters()" class="apply-filters">
        <mat-icon>check_circle</mat-icon>
        <span>Apply Filters</span>
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="loading-state">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Loading accounts...</p>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && dataSource.length === 0" class="empty-state">
    <mat-icon class="empty-icon">people_outline</mat-icon>
    <h3>No Accounts Found</h3>
    <p>Try adjusting your filters or add a new account</p>
    <button mat-raised-button color="primary" (click)="openCreateAccountModal()">
      <mat-icon>person_add</mat-icon>
      <span>Create Account</span>
    </button>
  </div>

  <!-- Account Cards Grid -->
  <div *ngIf="!loading && dataSource.length > 0" class="account-grid">
    <mat-card *ngFor="let account of paginatedDataSource" class="account-card">
      <div class="account-header">
        <div class="account-badge" *ngIf="account.badge">
          <img [src]="account.badge" alt="Account badge" class="badge-icon">
        </div>
        <span class="account-role" [ngClass]="'role-' + account.role.toLowerCase()">
          {{account.role}}
        </span>
      </div>

      <div class="account-photo-container">
        <img [src]="account.photo || './assets/default-avatar.png'" 
             alt="Account photo" 
             class="account-photo"
             (click)="viewAccountDetails(account.id)">
      </div>

      <mat-card-content class="account-content">
        <h3 class="account-name">{{account.name}}</h3>
        <p class="account-username">
         
          {{account.username}}
        </p>
        <p class="account-type">
          
          {{account.type}}
        </p>
      </mat-card-content>

      <mat-card-actions class="account-actions">
        <button mat-icon-button 
                (click)="viewAccountDetails(account.id)"
                matTooltip="View details"
                aria-label="View account details">
          <mat-icon>visibility</mat-icon>
        </button>
        
        <button mat-icon-button 
                (click)="openNonAvailabilityModal(account.id)"
                matTooltip="Set availability"
                aria-label="Set availability">
          <mat-icon>event_available</mat-icon>
        </button>
        
        <button mat-icon-button [matMenuTriggerFor]="accountMenu" aria-label="More options">
          <mat-icon>more_vert</mat-icon>
        </button>
        
        <mat-menu #accountMenu="matMenu">
          <button mat-menu-item (click)="openUpdateAccountModal(account.id)">
            <mat-icon color="primary">edit</mat-icon>
            <span>Edit</span>
          </button>
          <button mat-menu-item (click)="deleteAccount(account.id)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Delete</span>
          </button>
        </mat-menu>
      </mat-card-actions>
    </mat-card>
  </div>

  <!-- Pagination -->
  <div *ngIf="!loading && dataSource.length > 0" class="pagination-container">
    <p-paginator class="mission-paginator" [first]="first" 
    [rows]="rows" 
    [totalRecords]="totalRecords" 
    (onPageChange)="onPageChange($event)"
    class="mission-paginator"
    [showFirstLastIcon]="true">
  </p-paginator>
  </div>
</div>
</div>
