<mat-card class="cardWithShadow theme-card">
    <mat-card-header>
      <mat-card-title class="m-b-0">
        <mat-icon color="warn">warning</mat-icon> Confirm Deletion
      </mat-card-title>
    </mat-card-header>
  
    <mat-card-content class="b-t-1" style="padding: 16px;">
      <p style="font-size: 16px; color: #555;">Are you sure you want to delete this account? This action cannot be undone.</p>
      <div class="text-center" style="margin-top: 20px;">
        <button mat-raised-button color="primary" (click)="onDelete()" style="width: 120px; margin-right: 10px; padding: 10px 20px; font-size: 14px;">
          Yes
        </button>
        <button mat-stroked-button color="warn" type="button" (click)="onCancel()" style="width: 120px; padding: 10px 20px; font-size: 14px;">
          No
        </button>
      </div>
    </mat-card-content>
  </mat-card>
