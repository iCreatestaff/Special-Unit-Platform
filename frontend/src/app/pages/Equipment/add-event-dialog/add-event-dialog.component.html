<h2 mat-dialog-title>Add Event</h2>
<mat-dialog-content>
  <!-- Event Title Input -->
  <mat-form-field appearance="outline" class="full-width">
    <input matInput [(ngModel)]="eventTitle" placeholder="Event Title" />
  </mat-form-field>
  
  <!-- Event Date Input with Styling -->
  <mat-form-field appearance="outline" class="full-width">
    <input matInput [(ngModel)]="eventDate" type="date" placeholder="Event Date" />
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button color="warn" type="button" (click)="onCancel()">Cancel</button>
  <button mat-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
