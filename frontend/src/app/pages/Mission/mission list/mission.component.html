<div class="container-fluid mt-5">
  <mat-card class="cardWithShadow theme-card b-1">
    <mat-card-header class="card-header d-flex justify-content-between align-items-center">
  <div class="h">Mission List</div>
  <div class="header-actions">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search Missions</mat-label>
      <input matInput (input)="applyFilter($event)" placeholder="Type here..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <button mat-raised-button style="margin-bottom: 18px;height:50px" (click)="openMissionDialog(null)">
      <mat-icon>add</mat-icon>
      <span>Add Mission</span>
    </button>
  </div>
</mat-card-header>

    <mat-card-content class="b-t-1">
      <div *ngIf="isLoading" class="loading-spinner">
        <mat-spinner diameter="50"></mat-spinner>
        <p>Loading missions...</p>
      </div>

      <div *ngIf="!isLoading && totalRecords === 0" class="empty-state">
        <mat-icon>assignment_late</mat-icon>
        <p>No missions found.</p>
      </div>

      <div *ngIf="!isLoading && totalRecords > 0" class="mission-list-wrapper table-responsive">
        <table mat-table [dataSource]="dataSource" class="w-100 tab">
          <!-- Column: Description -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14 mat-column-description">Description</th>
            <td mat-cell *matCellDef="let mission" class="mat-column-description elm">
              {{ mission.description }}
            </td>
          </ng-container>

          <!-- Column: Location -->
          <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14 mat-column-location">Location</th>
            <td mat-cell *matCellDef="let mission" class="mat-column-location elm">
              {{ cityNames[mission.id] || formatLocation(mission.location) }}
            </td>
          </ng-container>

          <!-- Column: Status -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let mission">
              <span class="status-badge" [ngClass]="getStatusClass(mission.status)">
                {{ mission.status }}
              </span>
            </td>
          </ng-container>

          <!-- Column: Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14 mat-column-actions">Actions</th>
            <td mat-cell *matCellDef="let mission" class="mat-column-actions">
              <div class="actions-container">
                <button mat-icon-button (click)="openMissionDetails(mission)" class="eye-icon">
                  <mat-icon color="primary">visibility</mat-icon>
                </button>
                <button mat-icon-button [matMenuTriggerFor]="menu" class="menu-button">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu" class="custom-menu">
                  <button mat-menu-item (click)="openMissionDialog(mission)">
                    <mat-icon class="menu-icon" style="color:#635bff">edit</mat-icon>
                    <span class="menu-text" style="color:#635bff;margin-top:10px;">Edit</span>
                  </button>
                  <button mat-menu-item (click)="confirmDelete(mission.id)">
                    <mat-icon class="menu-icon" style="color:#ff6692">delete</mat-icon>
                    <span class="menu-text" style="color:#ff6692;margin-top:10px;">Delete</span>
                  </button>
                </mat-menu>
              </div>
            </td>
          </ng-container>

          <!-- Table Rows -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
         <!-- Pagination Controls -->
         <p-paginator class="mission-paginator" [first]="first" 
            [rows]="rows" 
            [totalRecords]="totalRecords" 
            (onPageChange)="onPageChange($event)"
            styleClass="mission-paginator"
            [showFirstLastIcon]="true">
          </p-paginator>

       
      </div>
    </mat-card-content>
  </mat-card>
</div>
